spring.application.name=backend

# DB
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.rgsqjpnsqlsaowxzqlzi}
spring.datasource.password=${DB_PASSWORD:Shivang@1432}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate Performance Tuning
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Connection Pool (HikariCP) - Optimized for Supabase pooling
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# Disable Prepared Statements for Supabase/PgBouncer compatibility
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:ultronthor037@gmail.com}
spring.mail.password=${MAIL_PASSWORD:fuuj adbe wozd wbce}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT
jwt.secret=${JWT_SECRET:8fK3!xP9@vQ2#Lm7$Zr6&Nd1*Ht5YwU4Bs0GkJcR}
jwt.expiration=86400000

# Admin
admin.email=${ADMIN_EMAIL:shivangv493@gmail.com}

# Cache Configuration - Aggressive caching for products
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=300s,recordStats
spring.cache.cache-names=products,productList,allOrders,analytics,usersList,reviews,couponsList

# Server compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Performance
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000

# Server binding
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/

# HTTP/2
server.http2.enabled=true

# Startup logging
logging.level.root=INFO
logging.level.org.springframework.boot.web=INFO

# Keep DB fixer disabled in production-like environments.
# Enable manually only when needed via env: APP_DB_FIXER_ENABLED=true
app.db.fixer.enabled=true

# Keep product seeding off in deployment by default.
# Enable manually only when needed via env: APP_SEED_PRODUCTS_ENABLED=true
app.seed.products.enabled=${APP_SEED_PRODUCTS_ENABLED:false}
